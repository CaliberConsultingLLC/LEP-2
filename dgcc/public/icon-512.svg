<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1014"/>
      <stop offset="100%" stop-color="#07090a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c8b4"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
  </defs>
  <!-- Angular shape -->
  <polygon points="48,0 512,0 464,512 0,512" fill="url(#bg)" stroke="#005a50" stroke-width="3"/>
  <!-- Top accent line -->
  <line x1="48" y1="1.5" x2="512" y2="1.5" stroke="url(#accent)" stroke-width="3"/>
  <!-- Corner brackets -->
  <polyline points="70,28 70,60 102,60" fill="none" stroke="#00c8b4" stroke-width="3"/>
  <polyline points="442,452 442,484 410,484" fill="none" stroke="#1a2530" stroke-width="3"/>
  <!-- DG text -->
  <text x="256" y="280" font-family="sans-serif" font-weight="700" font-size="172" fill="#00c8b4" text-anchor="middle" letter-spacing="16">DG</text>
  <!-- Subtitle -->
  <text x="256" y="370" font-family="monospace" font-size="36" fill="#2e4858" text-anchor="middle" letter-spacing="8">COMMAND</text>
</svg>
